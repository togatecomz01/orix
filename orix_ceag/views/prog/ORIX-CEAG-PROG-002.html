<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>오릭스 전자법인약정</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet">

    <script src="../../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/jquery.form.min.js"></script>
    <script src="../../resource/js/common.js"></script>
    <script src="../../resource/js/include.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <style>
        .prog-step-panel { display: none; }
        .prog-step-panel.active { display: block; }
        .prog-step-panel #bottom-button-wrap .btn-area { display: flex; justify-content: center; gap: 20px; }
    </style>
</head>
<body>
    <div id="wrap">

        <div data-include-path="../include/inc-header.html"></div>

        <div id="contentWrap" role="main">
            <div class="contents">
                <ol class="step-progress">
                    <li class="active">
                        <span class="step-txt">계약 요건 및 상품 약관 동의</span>
                    </li>
                    <li>
                        <span class="step-txt">자동이체 및 납부정보 수집</span>
                    </li>
                    <li>
                        <span class="step-txt">최종 약정서 미리보기</span>
                    </li>
                    <li>
                        <span class="step-txt">전자서명</span>
                    </li>
                </ol>

                <div class="prog-step-panel active" data-step="1" data-step-path="./ORIX-CEAG-PROG-002-step1.html"></div>

                <div class="prog-step-panel" data-step="2" data-step-path="./ORIX-CEAG-PROG-002-step2.html"></div>

                <div class="prog-step-panel" data-step="3" data-step-path="./ORIX-CEAG-PROG-002-step3.html"></div>

                <div class="prog-step-panel" data-step="4" data-step-path="./ORIX-CEAG-PROG-002-step4.html"></div>
            </div>

        </div>

        <div data-include-path="../include/inc-footer.html"></div>
    </div>

    <script>
        $(function () {
            var $groups = $('.prog-step-panel');
            var $stepLis = $('.step-progress li');
            var PROC = $stepLis.length;
            var cur = 1;
    
            function formatDate(date) {
                var year = date.getFullYear();
                var month = String(date.getMonth() + 1).padStart(2, '0');
                var day = String(date.getDate()).padStart(2, '0');

                return year + '-' + month + '-' + day;
            }
    
            function syncDateLimit() {
                var todayObj = new Date();
    
                var minDateObj = new Date(
                    todayObj.getFullYear(),
                    todayObj.getMonth(),
                    todayObj.getDate() + 15
                );
    
                var maxDateObj = new Date(
                    todayObj.getFullYear(),
                    todayObj.getMonth(),
                    todayObj.getDate() + 56
                );
    
                $('.js-min-today')
                    .attr('min', formatDate(minDateObj))
                    .attr('max', formatDate(maxDateObj));
            }
    
            function getCacheBuster() {
                return new Date().getTime();
            }
    
            function getStepContent(response) {
                var $parsed = $('<div></div>').append($.parseHTML(response, document, false));
                var $contentWrap = $parsed.find('#contentWrap').first();
                var $contents = $parsed.find('#contentWrap > .contents').first();
                var $bottom = $contentWrap.children('#bottom-button-wrap').first();
                var $body = $parsed.find('body').first();
                var $result = $();
    
                if ($contents.length) {
                    $result = $result.add($contents.children().not('.step-progress').clone());
                    $result = $result.add($bottom.clone());
    
                    return $result;
                }
    
                if ($body.length) {
                    return $body.children().clone();
                }
    
                return $parsed.contents().clone();
            }
    
            function loadStepPanels(callback) {
                var requests = [];
    
                $('.prog-step-panel[data-step-path]').each(function () {
                    var $panel = $(this);
                    var path = $panel.attr('data-step-path');
                    var separator = path.indexOf('?') > -1 ? '&' : '?';
    
                    requests.push(
                        $.ajax({
                            url: path + separator + '_v=' + getCacheBuster(),
                            dataType: 'html'
                        }).done(function (response) {
                            $panel.empty().append(getStepContent(response));
                        }).fail(function (xhr) {
                            $panel.html([
                                '<div class="include-error">',
                                '<p>Step load failed.</p>',
                                '<p>Status: ' + xhr.status + ' ' + xhr.statusText + '</p>',
                                '<p>Path: ' + path + '</p>',
                                '</div>'
                            ].join(''));
                        })
                    );
                });
    
                $.when.apply($, requests).always(function () {
                    if (typeof callback === 'function') {
                        callback();
                    }
                });
            }
    
            function syncStepButtons() {
                $groups.each(function () {
                    var $group = $(this);
                    var step = parseInt($group.attr('data-step'), 10);
                    var $primary = $group.find('#bottom-button-wrap .btn-primary').last();
    
                    if (!$primary.length) {
                        return;
                    }
    
                    if (step < PROC) {
                        $primary
                            .attr('href', 'javascript:void(0);')
                            .attr('data-role', 'next');
                    }
                });
            }
    
            function scrollToActive() {
                $('html, body').stop(true).animate({ scrollTop: 0 }, 300);
            }
    
            function updateIndicator(step) {
                $stepLis.each(function (i) {
                    var idx = i + 1;
    
                    $(this)
                        .toggleClass('done', idx < step)
                        .toggleClass('active', idx === step)
                        .attr('aria-selected', idx === step ? 'true' : 'false');
                });
            }
    
            function setStep(n) {
                cur = Math.max(1, Math.min(n, PROC));
    
                $groups
                    .removeClass('active')
                    .eq(cur - 1)
                    .addClass('active');
    
                updateIndicator(cur);
                syncDateLimit();
                scrollToActive();
            }
    
            $(document).on('click', '[data-role="next"]', function (e) {
                e.preventDefault();
    
                if ($(this).hasClass('disabled') || $(this).attr('aria-disabled') === 'true') {
                    return;
                }
    
                if (cur < PROC) {
                    setStep(cur + 1);
                }
            });
    
            $(document).on('click', '[data-role="prev"]', function (e) {
                e.preventDefault();
    
                if (cur > 1) {
                    setStep(cur - 1);
                }
            });
    
            function initFromHash() {
                var h = (location.hash || '').replace('#', '');
    
                if (/^step[1-9]\d*$/.test(h)) {
                    var n = parseInt(h.replace('step', ''), 10);
                    setStep(isNaN(n) ? 1 : Math.min(Math.max(n, 1), PROC));
                } else {
                    setStep(1);
                }
            }
    
            loadStepPanels(function () {
                syncStepButtons();
                initFromHash();
            });
        });
    </script>
</body>
</html>
