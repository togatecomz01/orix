<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ORIX UI GUIDE - check</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/include.js"></script>
    <script src="../../resource/js/common.js"></script>

    <link href="../css/sample.css" rel="stylesheet">
</head>
<body>
    <div id="wrap">
        <!-- 
            D : 아래 inc-header.js는 퍼블용 인클루드 소스입니다.
            개발에서는 ../include/inc-header.html 확인하시면 됩니다.
        -->
        <div id="headerWrap"></div>
        <script src="../../views/include/inc-header.js"></script>

        <!-- 개발 확인용 헤더 인클루드 -->
        <!-- <div data-include-path="../include/inc-header.html"></div> -->

        <div id="contentWrap" role="main">
            <div class="contents">
                <div class="visual-content">
                    <h2 class="page-tit">Checkbox</h2>
                </div>
                <div class="layout-grid">
                    <div class="col-group">
                        <div class="card-box">
                            <h3 class="card-tit">하단 프로세스 진행 동의 체크박스</h3>
                            
                            <!-- 기본 텍스트 -->
                            <div class="form-wrap">
                                <div class="check-group rec">
                                    <input type="checkbox" id="check-on" name="row1-active-1" value="" checked="">
                                    <label for="check-on" class="check">Check Box ON</label>
                                </div>
    
                                <div class="check-group rec">
                                    <input type="checkbox" id="check-off" name="row1-active-2" value="">
                                    <label for="check-off" class="check">Check Box OFF</label>
                                </div>
    
                                <div class="check-group rec">
                                    <input type="checkbox" id="check-disabled" name="row1-active-3" value="" checked="" disabled="">
                                    <label for="check-disabled" class="check">Check Box Disable-checked</label>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="col-group">
                        <div class="card-box">
                            <h3 class="card-tit">컨텐츠 동의 체크박스</h3>
                            <div class="form-item">
                                <div class="check-group rec sm">
                                    <input type="checkbox" id="emailSame">
                                    <label for="emailSame">Check Box OFF</label>
                                </div>
                                <div class="check-group rec sm">
                                    <input type="checkbox" id="emailSame" checked>
                                    <label for="emailSame">Check Box ON</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-group">
                        <div class="card-box">
                            <h3 class="card-tit">약관 리스트</h3>
                            <div class="acc-item" style="border-bottom: 0;">
                                <div class="term-head">
                                    <div class="check-group line-type">
                                        <input type="checkbox" id="testTerm2" name="terms">
                                        <label for="testTerm2">승계수수료</label>
                                    </div>
                                </div>
                                <div class="acc-body">
                                    <div class="term-content">
                                        <p class="term-tit">승계시 수수료가 발생됩니다.</p>
                                    </div>
                                </div>
                            </div>
            
                            <div class="acc-item">
                                <div class="term-head">
                                    <div class="check-group line-type">
                                        <input type="checkbox" id="testTerm3" name="terms">
                                        <label for="testTerm3">반환지연금</label>
                                    </div>
                                </div>
                                <div class="acc-body">
                                    <div class="term-content">
                                        <p class="term-tit">월임대료(VAT미포함) / 30 X 경과일수 X 200%</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footerWrap" role="contentinfo">
            <div class="footer-inner">
                <div class="footer-notice">
                    <p class="notice-tit">ORIX UI STANDARD GUIDE</p>
                </div>
                <div class="btn-area">
                    <button type="button" class="btn-primary">가이드 확인 완료</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
