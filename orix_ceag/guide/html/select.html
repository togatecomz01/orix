<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ORIX UI GUIDE - Form</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/include.js"></script>
    <script src="../../resource/js/common.js"></script>

    <link href="../css/sample.css" rel="stylesheet">
</head>
<body>
    <div id="wrap">
        <!-- 
            D : 아래 inc-header.js는 퍼블용 인클루드 소스입니다.
            개발에서는 ../include/inc-header.html 확인하시면 됩니다.
        -->
        <div id="headerWrap"></div>
        <script src="../../views/include/inc-header.js"></script>

        <!-- 개발 확인용 헤더 인클루드 -->
        <!-- <div data-include-path="../include/inc-header.html"></div> -->

        <div id="contentWrap" role="main">
            <div class="contents">
                <div class="visual-content">
                    <h2 class="page-tit">Select</h2>
                </div>
                <div class="layout-grid row">
                    <div class="col-group">
                        <div class="card-box">
                            <h3 class="card-tit">1. 기본 입력 가이드</h3>
                            <ul class="info-list">
                                <li>
                                    <p class="tit">구조</p>
                                    <p class="desc">.form-item > label + .form-row</p>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <div class="col-group">
                        <div class="card-box">
                            <h3 class="card-tit">기본</h3>
                            
                            <!-- 기본 텍스트 -->
                            <div class="form-item">
                                <p class="form-label">기본</p>
                                <select class="form-input is-placeholder">
                                    <option value="" selected hidden>은행 선택</option>
                                    <option value="신한">신한</option>
                                    <option value="국민">국민</option>
                                    <option value="하나">하나</option>
                                </select>
                            </div>
                            
                            <!-- 포커스 -->
                            <div class="form-item">
                                <p class="form-label">포커스</p>
                                <select class="form-input is-placeholder" autofocus>
                                    <option value="" selected hidden>은행 선택</option>
                                    <option value="신한">신한</option>
                                    <option value="국민">국민</option>
                                    <option value="하나">하나</option>
                                </select>
                            </div>

                            <!-- 비활성 -->
                            <div class="form-item">
                                <p class="form-label">비활성</p>
                                <select class="form-input is-placeholder" disabled>
                                    <option value="" selected hidden>은행 선택</option>
                                    <option value="신한">신한</option>
                                    <option value="국민">국민</option>
                                    <option value="하나">하나</option>
                                </select>
                            </div>

                        </div>
                        <div class="card-box">
                            <h3 class="card-tit">Component Preview</h3>

                            <!-- 계좌번호 -->
                            <div class="form-item">
                                <label class="form-label">계좌번호 (분할형)</label>
                                <div class="form-row">
                                    <div class="col-bank">
                                        <select class="form-input is-placeholder">
                                            <option value="" disabled selected hidden>은행 선택</option>
                                            <option value="신한">신한</option>
                                            <option value="국민">국민</option>
                                            <option value="하나">하나</option>
                                        </select>
                                    </div>
                                    <div class="col-account">
                                        <input type="tel" class="form-input" placeholder="계좌번호 입력">
                                    </div>
                                </div>
                            </div>

                            <!-- 연락처1 -->
                            <div class="form-item">
                                <label class="form-label">연락처1 (자동 포커스 테스트)</label>
                                <div class="form-row">
                                    <select id="tel1" class="form-input is-placeholder" style="width:136px; flex:none;">
                                        <option value="" selected disabled hidden>선택</option>
                                        <option value="010">010</option>
                                        <option value="02">02</option>
                                    </select>
                                    <input type="tel" id="tel2" class="form-input" maxlength="4" placeholder="1234" inputmode="numeric">
                                    <input type="tel" id="tel3" class="form-input" maxlength="4" placeholder="5678" inputmode="numeric">
                                </div>
                            </div>
                        </div>
                    </div>
                </div> 
            </div> 
        </div> 

        <div id="footerWrap" role="contentinfo">
            <div class="footer-inner">
                <div class="footer-notice">
                    <p class="notice-tit">ORIX UI STANDARD GUIDE</p>
                </div>
                <div class="btn-area">
                    <button type="button" class="btn-primary">가이드 확인 완료</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
