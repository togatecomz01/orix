<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ORIX UI GUIDE - step</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/include.js"></script>
    <script src="../../resource/js/common.js"></script>

    <link href="../css/sample.css" rel="stylesheet">
</head>
<body>
    <div id="wrap">
        <!-- 
            D : 아래 inc-header.js는 퍼블용 인클루드 소스입니다.
            개발에서는 ../include/inc-header.html 확인하시면 됩니다.
        -->
        <div id="headerWrap"></div>
        <script src="../../views/include/inc-header.js"></script>

        <!-- 개발 확인용 헤더 인클루드 -->
        <!-- <div data-include-path="../include/inc-header.html"></div> -->

        <div id="contentWrap" role="main">
            <div class="contents">
                <ol class="step-progress">
                    <li class="done">
                        <span class="step-txt">신청 내역 확인</span>
                    </li>
                    <li class="active">
                        <span class="step-txt">약정서 및 약관 동의</span>
                    </li>
                    <li>
                        <span class="step-txt">고객 정보 및 자동이체 정보 입력</span>
                    </li>
                    <li>
                        <span class="step-txt">약정서 미리보기 및 전자서명</span>
                    </li>
                </ol>
                <div class="visual-content">
                    <h2 class="page-tit">step</h2>
                </div>
                <div class="layout-grid">
                    <div class="col-group">
                        <div class="card-box">
                            <h3 class="card-tit">step</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footerWrap" role="contentinfo">
            <div class="footer-inner">
                <div class="footer-notice">
                    <p class="notice-tit">ORIX UI STANDARD GUIDE</p>
                </div>
                <div class="btn-area">
                    <button type="button" class="btn-primary">가이드 확인 완료</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
