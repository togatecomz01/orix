<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ORIX UI GUIDE - Table</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/include.js"></script>
    <script src="../../resource/js/common.js"></script>

    <link href="../css/sample.css" rel="stylesheet">
</head>
<body>
    <div id="wrap">

        <!-- 
            D : 아래 inc-header.js는 퍼블용 인클루드 소스입니다.
            개발에서는 ../include/inc-header.html 확인하시면 됩니다.
        -->
        <div id="headerWrap"></div>
        <script src="../../views/include/inc-header.js"></script>

        <!-- 개발 확인용 헤더 인클루드 -->
        <!-- <div data-include-path="../include/inc-header.html"></div> -->

        <div id="contentWrap" role="main">
            <div class="contents">
                <div class="visual-content">
                    <h2 class="page-tit">Table</h2>
                </div>
                <div class="layout-grid">
                    <div class="col-group">
                        <div class="card-box">
                            <h3 class="card-tit">기본</h3>
                            <div class="table-content">
                                <table>
                                    <colgroup>
                                        <col style="width: 30%;">
                                        <col style="width: 70%;">
                                    </colgroup>
                                    <tbody>
                                        <tr>
                                            <th scope="row">약정번호</th>
                                            <td>Abc202600-00000</td>
                                        </tr>
                                        <tr>
                                            <th scope="row">약정일시</th>
                                            <td>2026.02.20 15:00:00</td>
                                        </tr>
                                        <tr>
                                            <th scope="row">고객명(법인명)</th>
                                            <td>(주)홍길동컴퍼니</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footerWrap" role="contentinfo">
            <div class="footer-inner">
                <div class="footer-notice">
                    <p class="notice-tit">Main Footer Button Layout</p>
                    <p class="sub-txt">페이지 하단에 고정되는 버튼 영역 예시입니다.</p>
                </div>
                <div class="btn-area">
                    <button type="button" class="btn-primary">다음 단계로 이동</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
