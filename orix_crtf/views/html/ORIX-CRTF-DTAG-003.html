<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>오릭스 A시안 (전자약정 완료)</title>
    
    <link href="../resource/css/ui-util.css" rel="stylesheet">

    <script src="../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../resource/js/jquery.form.min.js"></script>
    <script src="../resource/js/common.js"></script>
</head>
<body>
    <div id="wrap" class="complete-page">
        <!-- 헤더 -->
        <div id="headerWrap" role="banner">
            <div class="header-inner">
                <h1 class="logo"><a href="#"><img src="../resource/images/ORIX_logo.png" alt="오릭스"></a></h1>
                <div class="header-contact">
                    <span class="txt">고객센터</span>
                    <span class="tel">02-2050-6700</span>
                </div>
            </div>
        </div>

        <!-- 중앙 컨텐츠 -->
        <div id="contentWrap" role="main">
            <div class="contents">
                
                <div class="complete-container">
                    <div class="complete-visual"></div>
                    <h2 class="complete-tit">
                        법인전자약정이 성공적으로 <span class="blue">완료</span>되었습니다.
                    </h2>
                    <p class="complete-desc">
                        본인확인 시, 입력하신 이메일 주소로 약정서 사본과 체결 완료 안내가 발송되었으며,<br>
                        아래 [최종 약정서 PDF 다운로드]버튼을 통해서도 다운로드 받으실 수 있습니다.
                    </p>

                    <div class="complete-info-tbl">
                        <table>
                            <colgroup>
                                <col style="width: 30%;">
                                <col style="width: 70%;">
                            </colgroup>
                            <tbody>
                                <tr>
                                    <th scope="row">약정번호</th>
                                    <td>Abc202600-00000</td>
                                </tr>
                                <tr>
                                    <th scope="row">약정일시</th>
                                    <td>2026.02.20 15:00:00</td>
                                </tr>
                                <tr>
                                    <th scope="row">고객명(법인명)</th>
                                    <td>(주)홍길동컴퍼니</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="download-box">
                        <div class="txt-area">
                            <p class="tit">법인 서명 및 인감이 날인된 <span class="blue-b">최종 약정서</span>입니다.</p>
                            <p class="desc">향후 증빙 및 안전한 거래 기록 보관을 위해, 최종 완료된 약정서 사본을 다운로드하여 보관하시길 권장합니다.</p>
                        </div>
                        <div class="btn-area">
                            <button type="button" class="btn-primary btn-download">
                                <i class="ico-download"></i> 최종 약정서 PDF 다운로드
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
