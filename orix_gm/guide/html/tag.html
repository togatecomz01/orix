<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORIX UI GUIDE - Tag</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/jquery.form.min.js"></script>

    <link rel="stylesheet" href="../css/sample.css" rel="stylesheet">
</head>
<body>
    <div class="wrap">
        <!-- S: 사이드메뉴 -->
        <nav class="side-nav">
            <div class="logo">
                <a href="#none">
                    <img src="../../resource/images/com/svg/orix_logo.svg" alt="ORIX로고" />
                </a>
            </div>
            <ul class="side-menu">
                <li>
                    <a href="#none" title="공매입찰관리" class="on">
                        <img src="../../resource/images/com/svg/btn_bid_manage.svg" alt="공매입찰관리" />
                    </a>
                </li>
                <li>
                    <a href="#none" title="사용자관리">
                        <img src="../../resource/images/com/svg/btn_user_manage.svg" alt="사용자관리" />
                    </a>
                </li>
            </ul>
        </nav>
        <!-- E: 사이드메뉴 -->

        <main class="contentWrap">
            <!-- S: 시스템 상단 -->
            <section class="page-header">
                <h1>TAG</h1>
            </section>
            <!-- S: 본문 -->
            <section class="page-container">
                <ul class="card-list">
                    <li class="color-item">
                        <input type="text" class="tag-ing" value="진행중" readonly/>
                    </li>
                    <li class="color-item">
                        <input type="text" class="tag-end" value="종료" readonly/>
                    </li>
                    <li class="color-item">
                        <input type="text" class="tag-success" value="성공" readonly/>
                    </li>
                    <li class="color-item">
                        <input type="text" class="tag-error" value="실패" readonly/>
                    </li>
                </ul>
                <div class="example">
                    <h2 style=" padding:10px; margin-bottom:24px; background-color: antiquewhite;">예시)</h2>
                    <div class="grid-caption">
                        <div class="caption-left">
                            <input type="text" class="tag-end" value="입찰종료" readonly/>
                            <span class="total">Total: <span>251</span></span>
                        </div>
                        <ul class="m-dot">
                            <li>시작일시 : <input type="text" class="noline" readonly value="2026-03-09 12:00:00"></li>
                            <li>종료일시 : <input type="text" class="noline" readonly value="2026-03-11 17:00:00"></li>
                            <li>
                                서버일시 :
                                <span id="svtime" class="server-time">2026-03-24 13:50:00</span>
                                <input type="hidden" id="gaptime" name="gaptime">
                            </li>
                        </ul>
                    </div>
                </div>
            </section>
            <!-- E: 본문 -->
        </main>
    </div>
</body>
</html>
