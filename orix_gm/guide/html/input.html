<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORIX UI GUIDE - Input</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/lib/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/lib/jquery.form.min.js"></script>
    <script src="../../resource/js/include.js"></script>
    <script src="../../resource/js/nav.js"></script>

    <link rel="stylesheet" href="../css/sample.css" rel="stylesheet">
</head>
<body>
    <div class="wrap">
        <!-- S: 사이드메뉴 -->
        <div data-include-path="../../views/include/inc-nav.html"></div>
        <!-- E: 사이드메뉴 -->

        <main class="contentWrap">
            <!-- S: 시스템 상단 -->
            <section class="page-header">
                <h1>INPUT</h1>
            </section>
            <!-- S: 본문 -->
            <section class="page-container">
                <h2>column</h2>
                <div class="card-list">
                    <div class="form-content">
                        <div class="form-wrap">
                            <div class="form-group">
                                <label for="default" class="label-tit">label</label>
                                <input id="default" type="text" name="default" placeholder="디폴트">
                            </div>
                            <div class="form-group">
                                <label for="focus" class="label-tit">focus</label>
                                <input id="focus" type="text" name="focus" placeholder="포커스" autofocus="">
                            </div>
                            <div class="form-group">
                                <label for="diss" class="label-tit">disable</label>
                                <input id="diss" type="text" name="diss" placeholder="비활성" disabled="">
                            </div>
                        </div>
                    </div>
                </div>
                <h2>row</h2>
                <div class="card-list">
                    <div class="form-content">
                        <div class="form-wrap">
                            <div class="form-group">
                                <div class="flex-row">
                                    <label for="default" class="label-tit">label</label>
                                    <input id="default" type="text" name="default" placeholder="디폴트">
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="flex-row">
                                    <label for="focus" class="label-tit">focus</label>
                                    <input id="focus" type="text" name="focus" placeholder="포커스" autofocus="">
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="flex-row">
                                    <label for="diss" class="label-tit">disable</label>
                                    <input id="diss" type="text" name="diss" placeholder="비활성" disabled="">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="example">
                    <h2 style=" padding:10px; margin-bottom:24px; background-color: antiquewhite;">예시)</h2>
                    <div class="user-list">
                        <div class="user-item">
                            <h4>기본정보</h4>
                            <div class="form-content">
                                <div class="form-wrap">
                                    <div class="form-group">
                                        <label for="user-id" class="label-tit">ID</label>
                                        <input id="user-id" type="text" name="user-id" value="Zero00120" disabled="">
                                    </div>
                                    <div class="form-group">
                                        <label for="company-name" class="label-tit">업체명</label>
                                        <input id="company-name" type="text" name="company-name" value="심규남 (제로모터스)">
                                    </div>
                                    <div class="form-group">
                                        <label for="office-ctno" class="label-tit">사업자번호</label>
                                        <input id="office-ctno" type="text" name="office-ctno" placeholder="">
                                    </div>
                                    <div class="form-group">
                                        <label for="office-name" class="label-tit">사업자명 (오릭스 전산)</label>
                                        <input id="office-name" type="text" name="office-name" placeholder="">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="user-list info-text" style="margin-top: 20px;">
                        <div class="user-item">
                            <h4>기본정보</h4>
                            <div class="form-content">
                                <div class="form-wrap">
                                    <div class="form-group">
                                        <label for="new-password" class="label-tit">비밀번호 변경</label>
                                        <input id="new-password" type="password" name="new-password" placeholder="Zero00120">
                                    </div>
                                    <div class="form-group">
                                        <label for="new-password-cnt" class="label-tit">비밀번호 변경 확인</label>
                                        <input id="new-password-cnt" type="password" name="new-password-cnt" placeholder="">
                                    </div>
                                    
                                </div>
                                
                            </div>
                            <!-- 인풋 크기를 wrap에 맞출 시 position값 조절하거나 구조 수정-->
                            <div class="info-blue">비밀번호는 문자, 숫자 특수문자의 조합으로 8~15자리로 입력하여주세요. <br>
                                영어대문자(A~Z), 영어소문자(a~z), 숫자(0~9), 특수문자(!!!!!!!!!!!!!!!!)
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- E: 본문 -->
        </main>
    </div>
</body>
</html>
