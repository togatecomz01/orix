<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ORIX UI GUIDE - Popup</title>
    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/lib/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/lib/jquery.form.min.js"></script>
    <script src="../../resource/js/common.js"></script>
</head>
<body>
    <section class="modal-container">
        <div id="notiSave" class="layerPopup modal notice-layer on">
            <div class="pop-content notice-pop notice-save">
                <div class="popup">
                    <div class="newPop">
                        <div class="pop-header">
                            <h1>타이틀</h1>
                            <!-- 필요하면 닫기 버튼 추가 -->
                            <button type="button" class="pop-close-btn">닫기</button>
                        </div>
    
                        <div class="pop-main">
                            <div class="pop-body">
                                팝업 내용
                            </div>
    
                            <div class="pop-footer">
                                <div class="button-content">
                                    <button type="button" class="btn-pop-secondary">삭제</button>
                                    <button type="button" class="btn-pop-primary">등록</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>
        /* S : 26.04.24 공지사항 view, editor 퍼블 확인용 임시 스크립트 */
        $(function () {
            $(document).on('click', '.pop-close-btn', function (e) {
                e.preventDefault();
                $(this).closest('.layerPopup').removeClass('on');
                $('body').css('overflow', 'auto');
            });
        });
        /* E : 26.04.24 공지사항 view, editor 퍼블 확인용 임시 스크립트 */
    </script>
</body>
</html>
