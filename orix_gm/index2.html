<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>오릭스 공매입찰관리 메인</title>
        <link href="./resource/css/ui-util.css" rel="stylesheet" />
        <script src="./resource/js/lib/jquery-1.11.3.min.js"></script>
        <script src="./resource/js/lib/jquery.form.min.js"></script>
        <script src="./resource/js/include.js"></script>
        <script src="./resource/js/nav.js"></script>
        <script src="./resource/js/common.js"></script>
        <style>
            .main-wrap { position: relative; overflow: hidden; min-width: 1260px; min-height: 100vh; padding-left: 60px; box-sizing: border-box; background: url("./resource/images/main_bg.png") no-repeat left center / cover; }
            .main-wrap main.contentWrap .page-header { justify-content: flex-end; border-bottom:0; }

            .main-content { position: relative; z-index: 3; width: 1200px; margin: 0 auto; padding: 154px 0 84px; box-sizing: border-box; }

            .hero-layout { display: flex; justify-content: space-between; align-items: flex-start; min-height: 640px; gap: 40px; }
            .hero-copy { width: 476px; flex: 0 0 476px; }
            .hero-copy .sub-copy { font-size: var(--font20); font-weight: 400; color: var(--color-75); }
            .hero-copy .sub-copy strong { display: block; margin-bottom: 8px; font-size: var(--font28); font-weight:var(--font-w500); color: var(--color-2); }
            .hero-copy .main-copy { margin-top: 30px; font-size: var(--font42); font-weight:var(--font-w500); line-height: 1.45; letter-spacing: -0.03em; }
            .hero-copy .main-copy em { color:#121212; font-weight:var(--font-w600); }

            .hero-btn { display: inline-block; margin-top:30px; padding:16px 30px; border-radius: 50px; background:var(--secondary);  color:var(--color-f); font-size:var(--font24); font-weight:var(--font-w500);  text-align: center; }

            .notice-panel { width: 632px; flex: 0 0 632px; padding-bottom:10px; border: 1px solid rgba(255, 255, 255, 0.80); border-radius: 20px; background:linear-gradient(116deg, rgba(5, 69, 170, 0.60) 6.97%, rgba(42, 117, 242, 0.48) 87.95%); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); overflow: hidden; }
            .notice-head { position: relative; margin:0 42px 0 20px; padding:29px 0 12px; border-bottom:1px solid var(--color-f); }
            .notice-head h2 { font-size:var(--font30); font-weight:var(--font-w700); color:var(--color-f); }
            .notice-actions { position: absolute; right: 20px; top: 24px; font-size: 0; }
            .notice-list { min-height:400px; }
            .notice-list li { position: relative; min-height: 67px; margin:0 20px 0 30px; padding: 16px 0 14px; box-sizing: border-box; border-top: 1px solid rgba(255, 255, 255, 0.12); }
            .notice-list li:first-child { border-top:0; }
            .notice-list a { display: block; padding-right: 50px; }
            .notice-date { display: block; margin-bottom: 6px; color: rgba(255, 255, 255, 0.9); font-size: 15px; font-weight: 700; line-height: 1.2; }
            .notice-title { display: block; overflow: hidden; color: #ffffff; font-size: 16px; font-weight: 500; line-height: 1.45; letter-spacing: -0.02em; white-space: nowrap; text-overflow: ellipsis; }
            .notice-link { position: absolute; right: 24px; top: 50%; width: 16px; height: 16px; margin-top: -8px; }
            .notice-link:before, .notice-link:after { content: ""; position: absolute; background: #ffffff; }
            .notice-link:before { right: 1px; top: 1px; width: 11px; height: 2px; transform: rotate(-45deg); transform-origin: right center; }
            .notice-link:after { right: 0; top: 0; width: 2px; height: 11px; }
            #legacyGrid { display: none; }
        </style>
    </head>
    <body>
        <div class="main-wrap">
            <!-- S: 사이드메뉴 -->
            <div data-include-path="./views/include/inc-nav.html"></div>
            <!-- E: 사이드메뉴 -->

            <main class="contentWrap">
                <!-- S: 헤더 -->
                <div data-include-path="./views/include/inc-main-header.html"></div>
                <!-- E: 헤더 -->
    
                <div class="main-content">
                    <div class="hero-layout">
                        <div class="hero-copy">
                            <p class="sub-copy">
                                <strong>공매입찰관리의 새로운 기준</strong>
                                The New Standard in Vehicle Auction Management
                            </p>
                            <p class="main-copy">
                                공매입찰 정보를<br />
                                <em>[ 한눈에 ]</em> 정리해 확인하세요
                            </p>
                            <a href="../bidg/ORIX-AUTS-BIDG-001.html" class="hero-btn">공매입찰관리 바로가기</a>
                        </div>
    
                        <div class="notice-panel">
                            <div class="notice-head">
                                <h2>공지사항</h2>
                                <div class="notice-actions">
                                    <span class="notice-action">EXCEL</span>
                                    <span class="notice-action">조회</span>
                                </div>
                            </div>
                            <ul id="noticeList" class="notice-list"></ul>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div id="legacyGrid">
            <script>
                document.write('<object id="grdSheet01" width="100%" height="100%" classid="clsid:1F57AEAD-DB12-11D2-A4F9-00608CEBEE49" codebase="/autocomm/ocx/toinb/toinbgrid.cab#version=1,1,0,122"></object>');
            </script>
        </div>

        <script>
            /* ================================================================
            1. 더미 데이터 (디자인 확인용)
            - ActiveX Grid 데이터가 없을 때 사용
            - 화면 UI 확인용 임시 데이터
            ================================================================ */
            var mockData = [
                { date: "2026/03/06", title: "26년 3월 1차 공매 - 차량검수 3일(3/9 월 ~ 3월11 수), 입찰기한 (3/11 수 5시), 요약 내용" },
                { date: "2024/11/28", title: "오릭스 사업자등록증" },
                { date: "2024/09/23", title: "입금계좌 안내" },
                { date: "2024/09/06", title: "[초기설정] 일괄 입찰용 파일 설치 안내" },
                { date: "2024/09/06", title: "[초기설정] Chrome, Edge에서 사이트 접속 설정" }
            ];

            /* ================================================================
            2. 공통 유틸 함수
            ================================================================ */
            /**
             * HTML 특수문자 치환
             * - 문자열을 그대로 HTML에 출력할 때 태그로 해석되는 것을 방지
             * - XSS 및 마크업 깨짐 방지 목적
            */
            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            /* ================================================================
            3. UI 렌더링
            ================================================================ */
            /**
             * 공지사항 리스트 렌더링
             * - 데이터 배열을 받아 HTML 문자열 생성 후 DOM에 반영
             * - Grid 데이터 / 더미 데이터 공통 사용
            */
            function renderNoticeList(data) {
                var listHtml = "";
                var i;
                var item;

                for (i = 0; i < data.length; i++) {
                    item = data[i];
                    listHtml += '<li>';
                    listHtml += '    <a href="#none">';
                    listHtml += '        <span class="notice-date">[' + escapeHtml(item.date) + ']</span>';
                    listHtml += '        <span class="notice-title">' + escapeHtml(item.title) + "</span>";
                    listHtml += '        <span class="notice-link"></span>';
                    listHtml += "    </a>";
                    listHtml += "</li>";
                }

                $("#noticeList").html(listHtml);
            }

            /* ================================================================
            4. 데이터 처리 (ActiveX -> JS 변환)
            ================================================================ */
            /**
             * ActiveX Grid 데이터 조회
             * - grdSheet01에서 공지 데이터를 읽어 JS 배열로 변환
             * - Grid가 없으면 빈 배열 반환
            */
            function getGridData() {
                var result = [];
                var rowCount;
                var i;
                var title;

                if (!window.grdSheet01 || !window.grdSheet01.RowCount) {
                    return result;
                }

                rowCount = grdSheet01.RowCount;

                for (i = 1; i <= rowCount; i++) {
                    title = grdSheet01.GetCellValue(i, "TITLE");

                    result.push({
                        date: grdSheet01.GetCellValue(i, "NOTICE_DATE"),
                        title: title
                    });
                }

                return result;
            }

            /* ================================================================
            5. 초기 실행
            ================================================================ */
            /**
             * 공지사항 초기 렌더링
             * - Grid 데이터 우선 사용
             * - 없으면 더미 데이터 사용
            */
            $(function () {
                var realData = getGridData();

                if (realData.length) {
                    renderNoticeList(realData);
                    return;
                }

                renderNoticeList(mockData);
            });
        </script>
    </body>
</html>
