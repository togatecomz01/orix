<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이아웃</title>

    <link href="../resource/css/ui-util.css" rel="stylesheet">
    <script src="../resource/js/jquery-1.11.3.min.js"></script>
    <script src="../resource/js/jquery.form.min.js"></script>
</head>
<body>
    <div class="wrap">
        <!-- S: 사이드메뉴 -->
        <nav class="side-nav">
            <div class="logo">
                <a href="#none">
                    <img src="../resource/images/com/svg/orix_logo.svg" alt="ORIX로고" />
                </a>
            </div>
            <ul class="side-menu">
                <li>
                    <a href="#none" title="공매입찰관리" class="on">
                        <img src="../resource/images/com/svg/btn_bid_manage.svg" alt="공매입찰관리" />
                    </a>
                </li>
                <li>
                    <a href="#none" title="사용자관리">
                        <img src="../resource/images/com/svg/btn_user_manage.svg" alt="사용자관리" />
                    </a>
                </li>
            </ul>
        </nav>
        <!-- E: 사이드메뉴 -->

        <main class="contentWrap">
            <!-- S: 시스템 상단 -->
            <section class="page-header">
                <h1>공매입찰 관리 시스템</h1>
                <div class="user-links">
                    <div class="user-info">
                        <span class="user-thumb">
                            <img src="../resource/images/img_profile.png" alt="사용자 프로필" />
                        </span>
            
                        <span class="user-name">심규남(제로모티스)</span>
                    </div>
                    <a href="#none" class="btn-logout">로그아웃</a>
                </div>
            </section>
            <!-- S: 페이지 상단 -->
            <section class="page-control">
                <div class="control-header">
                    <h2>사용자관리</h2>
                    <div class="control-actions">
                        <button type="button" class="btn-form btn-inquire">조회</button>
                    </div>
                </div>
            </section>
            <!-- E: 페이지 상단 -->
            <!-- S: 본문 -->
            <section class="page-container">
                <div class="user-list">
                    <div class="user-item">
                        <h4>기본정보</h4>
                        <div class="form-content">
                            <div class="form-wrap">
                                <div class="form-group">
                                    <label for="user-id" class="label-tit">ID</label>
                                    <input id="user-id" type="text" name="user-id" value="Zero00120" disabled="">
                                </div>
                                <div class="form-group">
                                    <label for="company-name" class="label-tit">업체명</label>
                                    <input id="company-name" type="text" name="company-name" value="심규남 (제로모터스)">
                                </div>
                                <div class="form-group">
                                    <label for="office-ctno" class="label-tit">사업자번호</label>
                                    <input id="office-ctno" type="text" name="office-ctno" placeholder="">
                                </div>
                                <div class="form-group">
                                    <label for="office-name" class="label-tit">사업자명 (오릭스 전산)</label>
                                    <input id="office-name" type="text" name="office-name" placeholder="">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- E: 본문 -->
            <!-- S: 페이지 상단 -->
            <section class="page-control bid-manage">
                <div class="control-header">
                    <h2>공매입찰관리</h2>
                    <div class="control-actions">
                        <button type="button" class="btn-form btn-excel" data-popup-target="excelPopup">EXCEL</button>
                        <button type="button" class="btn-form btn-inquire">조회</button>
                    </div>
                </div>
                <div class="form-content">
                    <div class="form-wrap">
                        <div class="form-group form-manage-no">
                            <div class="flex-row">
                                <label for="fruits" class="label-tit">관리번호</label>
                                <div class="field-box">
                                    <select name="fruits" required="">
                                        <option value="" disabled="" selected="">선택해주세요.</option>
                                        <option value="1">옵션1</option>
                                        <option value="2">옵션2</option>
                                        <option value="3">옵션3</option>
                                        <option value="4">옵션4</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-car-no">
                            <div class="flex-row">
                                <label for="default" class="label-tit">차량번호</label>
                                <div class="field-box">
                                    <input id="default" type="text" name="default" placeholder="디폴트">
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-maker">
                            <div class="flex-row">
                                <label for="fruits" class="label-tit">제조사</label>
                                <div class="field-box">
                                    <select name="fruits" required="">
                                        <option value="" disabled="" selected="">선택해주세요.</option>
                                        <option value="1">옵션1</option>
                                        <option value="2">옵션2</option>
                                        <option value="3">옵션3</option>
                                        <option value="4">옵션4</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-model">
                            <div class="flex-row">
                                <label for="fruits" class="label-tit">차종</label>
                                <div class="field-box">
                                    <select name="fruits" required="">
                                        <option value="" disabled="" selected="">선택해주세요.</option>
                                        <option value="1">옵션1</option>
                                        <option value="2">옵션2</option>
                                        <option value="3">옵션3</option>
                                        <option value="4">옵션4</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-status">
                            <div class="flex-row">
                                <label for="fruits" class="label-tit">구분</label>
                                <div class="field-box">
                                    <select name="fruits" required="">
                                        <option value="" disabled="" selected="">전체</option>
                                        <option value="1">입찰</option>
                                        <option value="2">낙찰</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- E: 페이지 상단 -->
            <!-- S: 본문 -->
            <section class="page-container">
                <!-- 그리드 -->
            </section>
            <!-- E: 본문 -->
        </main>
    </div>

    <section class="layerPopup modal" id="excelPopup" aria-hidden="true">
        <div class="pop-content" tabindex="0">
            <div class="pop-header">
                <div class="pop-tit">
                    <h2>엑셀 다운로드</h2>
                </div>
                <button type="button" class="btn-close popup-close">닫기</button>
            </div>
            <div class="pop-body">
                <p>엑셀 다운로드를 진행하시겠습니까?</p>
            </div>
            <div class="pop-footer">
                <div class="button-wrap popup">
                    <button type="button" class="btn-pop-secondary popup-close">취소</button>
                    <button type="button" class="btn-pop-primary">다운로드</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        $(function () {
            $('.btn-excel').on('click', function () {
                $('#' + $(this).data('popup-target')).addClass('on').attr('aria-hidden', 'false');
            });

            $('.popup-close').on('click', function () {
                $(this).closest('.layerPopup').removeClass('on').attr('aria-hidden', 'true');
            });

            $('.layerPopup').on('click', function (e) {
                if ($(e.target).is('.layerPopup')) {
                    $(this).removeClass('on').attr('aria-hidden', 'true');
                }
            });
        });
    </script>
</body>
</html>
