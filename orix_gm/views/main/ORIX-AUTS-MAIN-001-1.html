            .main-page2 .notice-list a {

    <body class="main-body">

        <div id="legacyGrid">
            <script>
                document.write('<object id="grdSheet01" width="100%" height="100%" classid="clsid:1F57AEAD-DB12-11D2-A4F9-00608CEBEE49" codebase="/autocomm/ocx/toinb/toinbgrid.cab#version=1,1,0,122"></object>');
            </script>
        </div>

        <script>
            var mockData = [
                { date: "2026/03/06", title: "26년 3월 1차 공매 - 차량검수 3일(3/9 월 ~ 3월11 수), 입찰기한 (3/11 수 5시)", isNew: true },
                { date: "2024/11/28", title: "오릭스 사업자등록증" },
                { date: "2024/09/23", title: "입금계좌 안내" },
                { date: "2024/09/06", title: "[초기설정] 일괄 입찰용 파일 설치 안내" },
                { date: "2024/09/06", title: "[초기설정] Chrome, Edge에서 사이트 접속 설정" },
                { date: "2024/09/06", title: "[초기설정] Chrome, Edge에서 사이트 접속 설정" },
                { date: "2024/09/06", title: "[초기설정] Chrome, Edge에서 사이트 접속 설정" }
            ];

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function renderNoticeList(data) {
                var listHtml = "";
                var i;
                var item;

                for (i = 0; i < data.length; i++) {
                    item = data[i];
                    listHtml += "<li>";
                    listHtml += '    <a href="#none" class="js-open-pop">';
                    listHtml += '        <span class="notice-date">[' + escapeHtml(item.date) + "]</span>";
                    listHtml += '        <span class="notice-title">' + escapeHtml(item.title);

                    if (item.isNew) {
                        listHtml += '<span class="badge-new">NEW</span>';
                    }

                    listHtml += "        </span>";
                    listHtml += '        <span class="notice-link"></span>';
                    listHtml += "    </a>";
                    listHtml += "</li>";
                }

                $("#noticeList").html(listHtml);
            }

            function getGridData() {
                var result = [];
                var rowCount;
                var i;
                var title;

                if (!window.grdSheet01 || !window.grdSheet01.RowCount) {
                    return result;
                }

                rowCount = grdSheet01.RowCount;

                for (i = 1; i <= rowCount; i++) {
                    title = grdSheet01.GetCellValue(i, "TITLE");

                    result.push({
                        date: grdSheet01.GetCellValue(i, "NOTICE_DATE"),
                        title: title,
                        isNew: false
                    });
                }

                return result;
            }

            $(function () {
                var realData = getGridData();

                if (realData.length) {
                    renderNoticeList(realData);
                    return;
                }

                renderNoticeList(mockData);
            });

            $(function () {
                $("#noticeList").on("click", ".js-open-pop", function (e) {
                    e.preventDefault();

                    var url = "../main/ORIX-AUTS-MAIN-002.html";
                    var name = "carDetailPop";
                    var option = "width=1000,height=900,scrollbars=yes,resizable=yes";

                    window.open(url, name, option);
                });

                $(".js-open-editer-pop").on("click", function () {
                    var url = "../main/ORIX-AUTS-MAIN-003.html";
                    var name = "noticeEnrollPop";
                    var option = "width=1000,height=900,scrollbars=yes,resizable=yes";

                    window.open(url, name, option);
                });
            });
        </script>
    </body>
