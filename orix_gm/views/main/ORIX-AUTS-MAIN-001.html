<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width:1200px, initial-scale=1.0" />
        <title>오릭스 공매입찰관리 메인</title>
        <link href="../../resource/css/ui-util.css" rel="stylesheet">
        <script src="../../resource/js/jquery-1.11.3.min.js"></script>
        <script src="../../resource/js/jquery.form.min.js"></script>
        <script src="../../resource/js/common.js"></script>
        <style>
            html,
            body {
                min-width: 1200px;
                height: 100%;
            }

            body {
                margin: 0;
                font-family: "Noto Sans KR", "S-Core Dream", sans-serif;
                font-size: 14px;
                color: #ffffff;
                background: #10263f;
            }

            button,
            input,
            select,
            textarea {
                font-family: inherit;
                font-size: inherit;
            }

            ul,
            ol {
                margin: 0;
                padding: 0;
                list-style: none;
            }

            p,
            h1,
            h2,
            h3 {
                margin: 0;
            }

            a {
                color: inherit;
                text-decoration: none;
            }

            .main-wrap {
                position: relative;
                overflow: hidden;
                min-height: 100vh;
                padding-left: 58px;
                box-sizing: border-box;
                background:
                    linear-gradient(90deg, rgba(10, 24, 40, 0.68) 0%, rgba(16, 38, 63, 0.3) 26%, rgba(26, 64, 108, 0.36) 100%),
                    radial-gradient(circle at 14% 18%, rgba(255, 228, 194, 0.48) 0%, rgba(255, 228, 194, 0) 30%),
                    radial-gradient(circle at 80% 30%, rgba(141, 195, 255, 0.22) 0%, rgba(141, 195, 255, 0) 34%),
                    linear-gradient(135deg, #d4dbe3 0%, #8ea4bb 28%, #5a7695 56%, #233d5c 100%);
            }

            .main-wrap:before,
            .main-wrap:after {
                content: "";
                position: absolute;
                border-radius: 50%;
                pointer-events: none;
            }

            .main-wrap:before {
                top: -140px;
                left: 220px;
                width: 480px;
                height: 480px;
                background: rgba(255, 255, 255, 0.08);
                filter: blur(30px);
            }

            .main-wrap:after {
                right: -120px;
                bottom: -120px;
                width: 420px;
                height: 420px;
                background: rgba(124, 179, 255, 0.12);
                filter: blur(24px);
            }

            .page-head {
                position: relative;
                z-index: 3;
                padding: 16px 26px 0 0;
                text-align: right;
            }

            .user-links {
                display: inline-block;
                font-size: 0;
                vertical-align: top;
            }

            .user-links span,
            .user-links a {
                display: inline-block;
                margin-left: 10px;
                padding: 7px 12px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.88);
                color: #4d5d70;
                font-size: 12px;
                line-height: 1;
                vertical-align: middle;
            }

            .user-links span:first-child {
                margin-left: 0;
            }

            .main-content {
                position: relative;
                z-index: 3;
                width: 1200px;
                margin: 0 auto;
                padding: 108px 0 84px;
                box-sizing: border-box;
            }

            .hero-layout {
                position: relative;
                min-height: 640px;
            }

            .hero-copy {
                width: 420px;
                padding-top: 108px;
            }

            .hero-copy .sub-copy {
                font-size: 18px;
                font-weight: 400;
                line-height: 1.65;
                color: rgba(255, 255, 255, 0.88);
            }

            .hero-copy .sub-copy strong {
                display: block;
                margin-bottom: 2px;
                font-size: 20px;
                font-weight: 500;
                color: #ffffff;
            }

            .hero-copy .main-copy {
                margin-top: 26px;
                font-size: 36px;
                font-weight: 700;
                line-height: 1.45;
                letter-spacing: -0.03em;
            }

            .hero-copy .main-copy em {
                font-style: normal;
                font-weight: 800;
            }

            .hero-btn {
                display: inline-block;
                min-width: 254px;
                margin-top: 28px;
                padding: 18px 28px;
                border-radius: 999px;
                background: linear-gradient(90deg, #2379ff 0%, #3f98ff 100%);
                box-shadow: 0 10px 24px rgba(12, 61, 138, 0.35);
                color: #ffffff;
                font-size: 18px;
                font-weight: 700;
                line-height: 1;
                text-align: center;
            }

            .notice-panel {
                position: absolute;
                top: 46px;
                right: 0;
                width: 632px;
                border: 1px solid rgba(255, 255, 255, 0.42);
                border-radius: 22px;
                background: rgba(102, 140, 186, 0.22);
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(5px);
                -webkit-backdrop-filter: blur(5px);
                overflow: hidden;
            }

            .notice-head {
                position: relative;
                padding: 32px 96px 18px 30px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            }

            .notice-head h2 {
                font-size: 22px;
                font-weight: 700;
                line-height: 1.2;
            }

            .notice-actions {
                position: absolute;
                right: 20px;
                top: 24px;
                font-size: 0;
            }

            .notice-action {
                display: inline-block;
                min-width: 34px;
                height: 22px;
                margin-left: 6px;
                padding: 0 8px;
                border-radius: 4px;
                background: rgba(48, 69, 97, 0.46);
                color: rgba(255, 255, 255, 0.78);
                font-size: 11px;
                line-height: 22px;
                text-align: center;
                box-sizing: border-box;
            }

            .notice-action:first-child {
                margin-left: 0;
            }

            .notice-list li {
                position: relative;
                min-height: 67px;
                padding: 16px 68px 14px 30px;
                box-sizing: border-box;
                border-top: 1px solid rgba(255, 255, 255, 0.12);
            }

            .notice-list li:first-child {
                border-top: 0;
            }

            .notice-list a {
                display: block;
            }

            .notice-date {
                display: block;
                margin-bottom: 6px;
                color: rgba(255, 255, 255, 0.9);
                font-size: 15px;
                font-weight: 700;
                line-height: 1.2;
            }

            .notice-title {
                display: block;
                color: #ffffff;
                font-size: 16px;
                font-weight: 500;
                line-height: 1.45;
                letter-spacing: -0.02em;
                word-break: keep-all;
            }

            .notice-title .badge-new {
                display: inline-block;
                margin-left: 8px;
                padding: 2px 7px 1px;
                border-radius: 999px;
                background: rgba(39, 124, 255, 0.96);
                font-size: 11px;
                font-weight: 700;
                line-height: 1.2;
                vertical-align: middle;
            }

            .notice-link {
                position: absolute;
                right: 24px;
                top: 50%;
                width: 16px;
                height: 16px;
                margin-top: -8px;
            }

            .notice-link:before,
            .notice-link:after {
                content: "";
                position: absolute;
                background: #ffffff;
            }

            .notice-link:before {
                right: 1px;
                top: 1px;
                width: 11px;
                height: 2px;
                transform: rotate(-45deg);
                transform-origin: right center;
            }

            .notice-link:after {
                right: 0;
                top: 0;
                width: 2px;
                height: 11px;
            }

            #legacyGrid {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="main-wrap">
            <!-- S: 사이드메뉴 -->
            <nav class="side-nav">
                <div class="logo">
                    <a href="#none">
                        <img src="../../resource/images/com/svg/orix_logo.svg" alt="ORIX로고" />
                    </a>
                </div>
                <ul class="side-menu">
                    <li>
                        <a href="#none" title="공매입찰관리" class="on">
                            <img src="../../resource/images/com/svg/btn_bid_manage.svg" alt="공매입찰관리" />
                        </a>
                    </li>
                    <li>
                        <a href="#none" title="사용자관리">
                            <img src="../../resource/images/com/svg/btn_user_manage.svg" alt="사용자관리" />
                        </a>
                    </li>
                </ul>
            </nav>
            <!-- E: 사이드메뉴 -->

            <div class="page-head">
                <div class="user-links">
                    <span>심규남(제로모티스)</span>
                    <a href="#none">로그아웃</a>
                </div>
            </div>

            <div class="main-content">
                <div class="hero-layout">
                    <div class="hero-copy">
                        <p class="sub-copy">
                            <strong>차량 관리의 새로운 기준</strong>
                            The New Standard in Vehicle Management.
                        </p>
                        <p class="main-copy">
                            차량 정보를<br />
                            <em>[ 한눈에 ]</em> 확인하세요
                        </p>
                        <a href="#none" class="hero-btn">공매입찰관리 바로가기</a>
                    </div>

                    <div class="notice-panel">
                        <div class="notice-head">
                            <h2>공지사항</h2>
                            <div class="notice-actions">
                                <span class="notice-action">EXCEL</span>
                                <span class="notice-action">조회</span>
                            </div>
                        </div>
                        <ul id="noticeList" class="notice-list"></ul>
                    </div>
                </div>
            </div>
        </div>

        <div id="legacyGrid">
            <script>
                document.write('<object id="grdSheet01" width="100%" height="100%" classid="clsid:1F57AEAD-DB12-11D2-A4F9-00608CEBEE49" codebase="/autocomm/ocx/toinb/toinbgrid.cab#version=1,1,0,122"></object>');
            </script>
        </div>

        <script>
            /* ================================================================
            1. 더미 데이터 (디자인 확인용)
            - ActiveX Grid 데이터가 없을 때 사용
            - 화면 UI 확인용 임시 데이터
            ================================================================ */
            var mockData = [
                { date: "2026/03/06", title: "26년 3월 1차 공매 - 차량검수 3일(3/9 월 ~ 3월11 수), 입찰기한 (3/11 수 5시)", isNew: true },
                { date: "2024/11/28", title: "오릭스 사업자등록증" },
                { date: "2024/09/23", title: "입금계좌 안내" },
                { date: "2024/09/06", title: "[초기설정] 일괄 입찰용 파일 설치 안내" },
                { date: "2024/09/06", title: "[초기설정] Chrome, Edge에서 사이트 접속 설정" }
            ];

            /* ================================================================
            2. 공통 유틸 함수
            ================================================================ */
            /**
             * HTML 특수문자 치환
             * - 문자열을 그대로 HTML에 출력할 때 태그로 해석되는 것을 방지
             * - XSS 및 마크업 깨짐 방지 목적
            */
            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            /* ================================================================
            3. UI 렌더링
            ================================================================ */
            /**
             * 공지사항 리스트 렌더링
             * - 데이터 배열을 받아 HTML 문자열 생성 후 DOM에 반영
             * - Grid 데이터 / 더미 데이터 공통 사용
            */
            function renderNoticeList(data) {
                var listHtml = "";
                var i;
                var item;

                for (i = 0; i < data.length; i++) {
                    item = data[i];
                    listHtml += '<li>';
                    listHtml += '    <a href="#none">';
                    listHtml += '        <span class="notice-date">[' + escapeHtml(item.date) + ']</span>';
                    listHtml += '        <span class="notice-title">' + escapeHtml(item.title);

                    if (item.isNew) {
                        listHtml += '<span class="badge-new">NEW</span>';
                    }

                    listHtml += "        </span>";
                    listHtml += '        <span class="notice-link"></span>';
                    listHtml += "    </a>";
                    listHtml += "</li>";
                }

                $("#noticeList").html(listHtml);
            }

            /* ================================================================
            4. 데이터 처리 (ActiveX -> JS 변환)
            ================================================================ */
            /**
             * ActiveX Grid 데이터 조회
             * - grdSheet01에서 공지 데이터를 읽어 JS 배열로 변환
             * - Grid가 없으면 빈 배열 반환
            */
            function getGridData() {
                var result = [];
                var rowCount;
                var i;
                var title;

                if (!window.grdSheet01 || !window.grdSheet01.RowCount) {
                    return result;
                }

                rowCount = grdSheet01.RowCount;

                for (i = 1; i <= rowCount; i++) {
                    title = grdSheet01.GetCellValue(i, "TITLE");

                    result.push({
                        date: grdSheet01.GetCellValue(i, "NOTICE_DATE"),
                        title: title,
                        isNew: false
                    });
                }

                return result;
            }

            /* ================================================================
            5. 초기 실행
            ================================================================ */
            /**
             * 공지사항 초기 렌더링
             * - Grid 데이터 우선 사용
             * - 없으면 더미 데이터 사용
            */
            $(function () {
                var realData = getGridData();

                if (realData.length) {
                    renderNoticeList(realData);
                    return;
                }

                renderNoticeList(mockData);
            });
        </script>
    </body>
</html>
