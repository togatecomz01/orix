        // 현재 선택된 관리번호 텍스트를 title 속성에 맞춘다.
        function syncFormFieldTitles() {
            $('.form-content .field-box input, .form-content .field-box select').each(function () {
                var $field = $(this);
                var value = '';

                if ($field.is('select')) {
                    value = $field.find('option:selected').text();
                } else {
                    value = $field.val();
                }

                $field.attr('title', $.trim(value || ''));
            });
        }

        // 퍼블 확인용 공매물건번호를 공매번호-순번 형식으로 표시한다.
        function formatBidItemNo(value) {
            var bidNo = value.row.BIDNO_IDX || '';
            var itemNo = value.row.rowKey + 1;

            return bidNo + '-' + ('000' + itemNo).slice(-3);
        }

        // 팝업 너비에 맞춰 그리드 레이아웃을 다시 계산한다.
        function refreshGridLayout() {
            if (!grid) {
                return;
            }

            syncGridBodyHeight();
            grid.refreshLayout();
        }

        // 팝업에서 남은 높이만큼 그리드 body 높이를 계산해 body 스크롤을 막는다.
        function syncGridBodyHeight() {
            var $popupContent = $('.popup.grid .pop-content');
            var $gridBody = $('.popup.grid .grid-body');
            var $gridCaption = $('.popup.grid .grid-caption');
            var gridBodyHeight = 0;

            if (!$popupContent.length || !$gridBody.length) {
                return;
            }

            gridBodyHeight = $popupContent.innerHeight() - $gridBody.position().top - 16;
            gridBodyHeight -= $gridCaption.outerHeight(true) || 0;
            gridBodyHeight = Math.max(gridBodyHeight, 180);

            if (typeof grid.setBodyHeight === 'function') {
                grid.setBodyHeight(gridBodyHeight);
            }
        }

        // Grid를 생성
        function createGrid() {
            if (!window.tui || !window.tui.Grid) {
                return;
            }

            tui.Grid.setLanguage('ko', {
                display: {
                    noData: '데이터가 없습니다.'
                }
            });

            grid = new tui.Grid({
                el: document.getElementById('grid'),
                usageStatistics: false,
                data: sampleGridData,
                bodyHeight: 'auto',
                rowHeight: 44,
                header: {
                    height:30
                },
                scrollX: false,
                scrollY: true,
                editingEvent: 'dblclick',
                columns: [
                    { header: '공매번호', name: 'BIDNO_IDX', width: 90, align: 'center', sortable: true },
                    { header: '차량번호', name: 'CAR_NO', width: 100, align: 'center', sortable: true },
                    { header: '제조사', name: 'CAR_MAKER', width: 90, align: 'center', sortable: true },
                    { header: '차종', name: 'CAR_NAME', width: 120, sortable: true },
                    { header: '색상', name: 'CAR_COLOR', width: 70, align: 'center', sortable: true },
                    { header: '연식', name: 'CAR_OLD', width: 70, align: 'center', sortable: true },
                    { header: '배기량', name: 'CAR_CC', width: 80, align: 'center', sortable: true },
                    { header: '주행거리', name: 'CAR_DRIVEKM', width: 90, align: 'center', sortable: true },
                    { header: '주차장', name: 'CAR_PARK', width: 100, align: 'center', sortable: true },
                    { header: '차대번호', name: 'CAR_BODY_NO', minWidth: 140, align: 'center', sortable: true },
                    { header: '공매물건번호', name: 'BID_ITEM_NO', width: 120, align: 'center', sortable: false, formatter: function (value) { return formatBidItemNo(value); } },
                    { header: '입찰가격(만원)', name: 'BID_PRICE', width: 110, align: 'right', sortable: true, editor: 'text' }
                ],
                columnOptions: {
                    minWidth: 70,
                    resizable: true
                }
            });
        }

        // 초기 진입 시 기본 화면을 세팅한다.
        function initializePage() {
            createGrid();
            syncFormFieldTitles();
            refreshGridLayout();
        }

        // 화면 이벤트를 바인딩한다.
        function bindEvents() {
            $('.form-content .field-box select').on('change', function () {
                syncFormFieldTitles();
            });

            $(window).on('resize', function () {
                refreshGridLayout();
            });
        }

        $(function () {
            initializePage();
            bindEvents();
        });
