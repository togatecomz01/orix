<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>윈도우 팝업-data download</title>
    <link href="../../resource/css/ui-util.css" rel="stylesheet">
    <script src="../../resource/js/lib/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/lib/jquery.form.min.js"></script>
    <script src="../../resource/js/common.js"></script>

    <!-- <link rel="stylesheet" href="../css/sample.css" rel="stylesheet" -->
</head>
<body>
    <section class="modal-container">
        <div id="excelTestPop" class="layerPopup modal excel-layer on">
            <div class="pop-content download-pop excel-pop">
                <div class="popup">
                    <div class="newPop">
                        <div class="pop-header">
                            <h1>엑셀 양식 다운로드</h1>
                            <button type="button" class="pop-close-btn">닫기</button>
                        </div>
                        <div class="pop-main download-pop">
                            <p class="download-alert">모든 다운로드 데이터는 별도 이력 관리 서버에 저장 됩니다.</p>

                            <div class="pop-body">
                                <h2 class="guide-tit">데이터 저장 및 다운로드 안내</h2>

                                <ul class="download-guide-list">
                                    <li>사용자 컴퓨터의 엑셀프로그램을 실행시켜 데이터를 Excel시트에 기록합니다.</li>
                                    <li>데이터를 텍스트 문서로 다운받아 엑셀로 여시면 됩니다. 다운로드 시간이 짧습니다.</li>
                                </ul>

                                <p class="download-guide-note">데이터 용량이 많을 경우 TEXT 다운로드를 권장합니다.</p>

                                <div class="button-content sm-button">
                                    <button type="button" class="btn-icon excel">엑셀 다운로드</button>
                                    <button type="button" class="btn-icon text">TEXT 다운로드</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>
        /* S : 26.04.24 공지사항 view, editor 퍼블 확인용 임시 스크립트 */
        $(function () {
            $(document).on('click', '.pop-close-btn', function (e) {
                e.preventDefault();
                $(this).closest('.layerPopup').removeClass('on');
                $('body').css('overflow', 'auto');
            });
        });
        /* E : 26.04.24 공지사항 view, editor 퍼블 확인용 임시 스크립트 */
    </script>
</body>
</html>
