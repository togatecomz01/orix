<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width:1200px, initial-scale=1.0" />
    <title>공매입찰관리</title>

    <link href="../../resource/css/ui-util.css" rel="stylesheet" />
    <link href="../../resource/css/lib/tui-grid.css" rel="stylesheet" />

    <script src="../../resource/js/lib/jquery-1.11.3.min.js"></script>
    <script src="../../resource/js/lib/jquery.form.min.js"></script>
    <script src="../../resource/js/include.js"></script>
    <script src="../../resource/js/nav.js"></script>
    <script>
        window.tui = window.tui || {};
        window.tui.DatePicker = window.tui.DatePicker || function () {};
        window.tui.Pagination = window.tui.Pagination || function () {};
        window.XLSX = window.XLSX || {};
    </script>
    <script src="../../resource/js/mock/bidg-sample-data.js"></script>
    <script src="../../resource/js/lib/tui-grid.js"></script>
</head>
<body data-nav-id="bidg">
    <div class="wrap">
        <!-- S: 사이드메뉴 -->
        <div data-include-path="../include/inc-nav.html"></div>
        <!-- E: 사이드메뉴 -->

        <main class="contentWrap">
            <!-- S: 시스템 상단 -->
            <div data-include-path="../include/inc-sub-header.html"></div>
            <!-- E: 시스템 상단 -->

            <!-- S: 페이지 상단 -->
            <section class="page-control">
                <div class="control-header">
                    <h2>공매입찰관리</h2>
                    <div class="la-button">
                        <button type="button" class="btn-icon excel" data-popup-target="excelPopup">EXCEL</button>
                        <button type="button" class="btn-primary" id="searchBtn">조회</button>
                    </div>
                </div>
                <div class="form-content">
                    <div class="form-wrap">
                        <div class="form-group form-manage-no">
                            <div class="flex-row">
                                <label for="bidNo" class="label-tit">관리번호</label>
                                <div class="field-box">
                                    <select name="bidNo" id="bidNo">
                                        <option value="260501" selected="selected">228차 2026년 05-1회 05-04~05-06</option>
                                        <option value="260401">227차 2026년 04-1회 04-06~04-08</option>
                                        <option value="260301">226차 2026년 03-1회 03-09~03-11</option>
                                        <option value="260201">225차 2026년 02-1회 02-02~02-04</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-car-no">
                            <div class="flex-row">
                                <label for="carNo" class="label-tit">차량번호</label>
                                <div class="field-box">
                                    <input id="carNo" type="text" name="carNo" placeholder="차량번호" />
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-maker">
                            <div class="flex-row">
                                <label for="maker" class="label-tit">제조사</label>
                                <div class="field-box">
                                    <select name="maker" id="maker">
                                        <option value="" selected="selected">제조사 선택</option>
                                        <option value="현대">현대</option>
                                        <option value="기아">기아</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-model">
                            <div class="flex-row">
                                <label for="carName" class="label-tit">차종</label>
                                <div class="field-box">
                                    <select name="carName" id="carName">
                                        <option value="" selected="selected"></option>
                                        <option value="그랜저">그랜저</option>
                                        <option value="K5">K5</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group form-status">
                            <div class="flex-row">
                                <label for="contractYn" class="label-tit">구분</label>
                                <div class="field-box">
                                    <select name="contractYn" id="contractYn">
                                        <option value="" selected="selected">전체</option>
                                        <option value="낙찰">낙찰</option>
                                        <option value="유찰">유찰</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- E: 페이지 상단 -->

            <!-- S: 본문 -->
            <section class="page-container">
                <div class="grid-content">
                    <div class="grid-head">
                        <h3>공매물건 목록</h3>
                        <div class="sm-button">
                            <button type="button" class="btn-primary disabled">입찰</button>
                            <button type="button" class="btn-icon bid disabled">일괄 입찰</button>
                            <!-- s: 관리자 계정 접속시에만 노출 -->
                            <button type="button" class="btn-icon download">공매 입찰 기록</button>
                            <!-- e: 관리자 계정 접속시에만 노출 -->
                        </div>
                    </div>
                    <div class="grid-body">
                        <div class="grid-caption">
                            <div class="caption-left">
                                <input type="text" class="bid-status-tag tag-end is-hidden" id="bidStatNm" name="BID_STAT_NM" value="" readonly />
                                <!--
                                    tag-end : 입찰 시간 종료, 공매 완료
                                    tag-ing : 입찰 진행중
                                    tag-error : 입찰 시간 전
                                -->
                                <span class="total">Total: <span>251</span></span>
                            </div>
                            <ul class="m-dot">
                                <li>시작일시 : <input type="text" class="noline" id="bidStartText" readonly value="2026-03-09 12:00:00"></li>
                                <li>종료일시 : <input type="text" class="noline" id="bidEndText" readonly value="2026-03-11 17:00:00"></li>
                                <li>
                                    서버일시 :
                                    <span id="svtime" class="server-time">2026-04-08 13:50:00</span>
                                    <input type="hidden" id="gaptime" name="gaptime">
                                </li>
                            </ul>
                        </div>
                        <div id="grid"></div>
                    </div>
                </div>
            </section>
            <!-- E: 본문 -->
        </main>
    </div>

    <script>
        var grid;

        // 그리드 총 건수를 상단에 표시한다.
        function setTotalCount(count) {
            $('.grid-caption .total span').text(count);
        }

        //******* [D]s : 퍼블 테스트용 *******//
        // 날짜/시간 문자열을 Date 객체로 변환한다.
        function parseDateTime(value) {
            var dateTime = value || '';
            var parts = dateTime.split(' ');
            var dateParts;
            var timeParts;

            if (parts.length < 2) {
                return null;
            }

            dateParts = parts[0].split('-');
            timeParts = parts[1].split(':');

            return new Date(
                parseInt(dateParts[0], 10),
                parseInt(dateParts[1], 10) - 1,
                parseInt(dateParts[2], 10),
                parseInt(timeParts[0], 10),
                parseInt(timeParts[1], 10),
                parseInt(timeParts[2], 10)
            );
        }

        // 현재 선택된 관리번호에 맞는 입찰 데이터를 찾는다.
        function getCurrentBidItem(list) {
            var bidNo = $('#bidNo').val();
            var item = null;
            var i;

            if (bidNo) {
                for (i = 0; i < list.length; i += 1) {
                    if (list[i].BIDNO_IDX === bidNo) {
                        item = list[i];
                        break;
                    }
                }
            }

            if (!item && list.length) {
                item = list[0];
            }

            return item;
        }

        // 입찰 상태명에 맞는 태그 클래스를 반환한다.
        function getBidStatusClass(statusText) {
            if (statusText === '입찰 진행중') {
                return 'tag-ing';
            }

            if (statusText === '입찰 시간 종료' || statusText === '공매 완료') {
                return 'tag-end';
            }

            if (statusText === '입찰 시간 전') {
                return 'tag-error';
            }

            return 'tag-success';
        }

        // 퍼블 테스트용으로 서버시간과 입찰 기간을 비교해 상단 상태값을 계산한다.
        // BID_STAT 같은 상태코드는 현재 화면에서 별도 사용하지 않고, 시작/종료일시 기준으로만 표시한다.
        function getBidStatusInfo(item) {
            var serverTime = parseDateTime($('#svtime').text());
            var bidStart = item ? parseDateTime(item.BID_START_DATE) : null;
            var bidEnd = item ? parseDateTime(item.BID_END_DATE) : null;
            var statusText = item ? (item.BID_STAT_NM || '') : '';

            if (!item) {
                return {
                    statusText: '',
                    statusClass: ''
                };
            }

            if (serverTime && bidStart && bidEnd) {
                statusText = '입찰 진행중';

                if (serverTime.getTime() < bidStart.getTime()) {
                    statusText = '입찰 시간 전';
                } else if (serverTime.getTime() > bidEnd.getTime()) {
                    statusText = '입찰 시간 종료';
                }
            }

            return {
                statusText: statusText,
                statusClass: getBidStatusClass(statusText)
            };
        }

        // 상단 상태 태그와 시작/종료일시
        function setBidStatus(item) {
            var $bidStatNm = $('#bidStatNm');
            var statusInfo = getBidStatusInfo(item);

            if (!item) {
                $bidStatNm.val('');
                $bidStatNm.removeClass('tag-end tag-ing tag-success tag-error');
                $bidStatNm.addClass('is-hidden');
                $('#bidStartText').val('');
                $('#bidEndText').val('');
                return;
            }

            $('#bidStartText').val(item.BID_START_DATE);
            $('#bidEndText').val(item.BID_END_DATE);

            $bidStatNm.val(statusInfo.statusText);
            $bidStatNm.removeClass('tag-end tag-ing tag-success tag-error');
            $bidStatNm.removeClass('is-hidden');
            $bidStatNm.addClass(statusInfo.statusClass);
        }
        //******* [D]e : 퍼블 테스트용 *******//

        // title
        function syncFormFieldTitles() {
            $('.form-content .field-box input, .form-content .field-box select').each(function () {
                var $field = $(this);
                var value = '';

                if ($field.is('select')) {
                    value = $field.find('option:selected').text();
                } else {
                    value = $field.val();
                }

                $field.attr('title', $.trim(value || ''));
            });
        }

        //******* [D]s : 퍼블 테스트용 *******//
        // 원화 금액을 만원 단위 문자열로 변환
        function formatPriceToManwon(value) {
            var number = parseInt(value, 10);

            if (isNaN(number)) {
                return '';
            }

            return String(Math.floor(number / 10000)).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // 낙찰/유찰
        function formatContractYn(value) {
            var text = value || '';
            var className = '';

            if (text === '낙찰') {
                className = 'bid-win';
            } else if (text === '유찰') {
                className = 'bid-fail';
            }

            if (!className) {
                return text;
            }

            return '<span class="' + className + '">' + text + '</span>';
        }
        // 숫자값을 천단위 콤마 형식 문자열로 변환
        function formatGridNumber(value) {
            var number = parseInt(String(value || '').replace(/[^0-9]/g, ''), 10);

            if (isNaN(number)) {
                return '0';
            }

            return String(number).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        //******* [D]e : 퍼블 테스트용 *******//

        // No 컬럼의 상태값에 따라 숫자 또는 체크 아이콘을 표시한다.
        function formatRowNumberCell(value) {
            if (value.row.ROW_CHECKED === 'Y') {
                return '<span class="grid-row-check" title="선택됨"></span>';
            }

            return value.row.rowKey + 1;
        }

        // 숫자 체크
        function setCheckedRowStyle(rowKey, checkedYn) {
            var columns;
            var i;

            if (!grid) {
                return;
            }

            if (checkedYn === 'Y') {
                grid.addRowClassName(rowKey, 'is-checked-row');
            } else {
                grid.removeRowClassName(rowKey, 'is-checked-row');
            }

            columns = grid.getColumns();

            for (i = 0; i < columns.length; i += 1) {
                if (checkedYn === 'Y') {
                    grid.addCellClassName(rowKey, columns[i].name, 'is-checked-cell');
                } else {
                    grid.removeCellClassName(rowKey, columns[i].name, 'is-checked-cell');
                }
            }
        }

        // 체크 토글
        function toggleRowChecked(rowKey) {
            var checkedYn;

            if (!grid) {
                return;
            }

            checkedYn = grid.getValue(rowKey, 'ROW_CHECKED') === 'Y' ? 'N' : 'Y';
            grid.setValue(rowKey, 'ROW_CHECKED', checkedYn);
            setCheckedRowStyle(rowKey, checkedYn);
        }

        // 체크 배경색
        function syncCheckedRowStyles() {
            var data;
            var i;

            if (!grid) {
                return;
            }

            data = grid.getData();

            for (i = 0; i < data.length; i += 1) {
                setCheckedRowStyle(data[i].rowKey, data[i].ROW_CHECKED);
            }
        }

        //******* [D]s : 퍼블 테스트용 *******//
        // 퍼블 확인용 샘플 데이터다.
        // 상단 입찰 상태는 샘플의 상태코드가 아니라 BID_START_DATE, BID_END_DATE, 서버일시 기준으로 계산한다.
        function getSampleData() {
            return window.bidgSampleData || [];
        }

        // 검색 조건에 맞는 샘플 데이터만 필터링
        function filterSampleData() {
            var list = getSampleData();
            var bidNo = $('#bidNo').val();
            var carNo = $('#carNo').val();
            var maker = $('#maker').val();
            var carName = $('#carName').val();
            var contractYn = $('#contractYn').val();

            return $.grep(list, function (item) {
                if (bidNo && item.BIDNO_IDX !== bidNo) {
                    return false;
                }

                if (carNo && item.CAR_NO.indexOf(carNo) < 0) {
                    return false;
                }

                if (maker && item.CAR_MAKER !== maker) {
                    return false;
                }

                if (carName && item.CAR_NAME !== carName) {
                    return false;
                }

                if (contractYn && item.CONTRACT_YN !== contractYn) {
                    return false;
                }

                return true;
            });
        }

        // 조회 버튼 클릭 시 필터링된 데이터와 상태를 갱신
        function searchData() {
            var filteredList = filterSampleData();
            var currentItem = getCurrentBidItem(filteredList);

            if (!grid) {
                return;
            }

            grid.resetData(filteredList);
            setTotalCount(filteredList.length);
            setBidStatus(currentItem);
            syncCheckedRowStyles();
        }

        // 최초 진입 시 샘플 데이터를 그리드에 바인딩한다.
        function loadSample() {
            var list = getSampleData();
            var currentItem = getCurrentBidItem(list);

            if (!grid) {
                return;
            }

            grid.resetData(list);
            setTotalCount(list.length);
            setBidStatus(currentItem);
            syncCheckedRowStyles();
        }

        // 최초 진입 시 빈 그리드와 기본 상태를 함께 세팅한다.
        function setInitialGridState() {
            if (!grid) {
                return;
            }

            grid.resetData([]);
            setTotalCount(0);
            setBidStatus(null);
        }
        //******* [D]e : 퍼블 테스트용 *******//

        // Grid를 생성
        function createGrid() {
            if (!window.tui || !window.tui.Grid) {
                return;
            }

            tui.Grid.setLanguage('ko', {
                display: {
                    noData: '데이터가 없습니다.'
                }
            });

            grid = new tui.Grid({
                el: document.getElementById('grid'),
                usageStatistics: false,
                bodyHeight: 500,
                rowHeight: 44,
                header: {
                    height:30
                },
                scrollX: true,
                scrollY: true,
                editingEvent: 'dblclick',
                columns: [
                    { header: 'No', name: 'ROW_NUM', width: 60, align: 'center', sortable: false, formatter: function (value) { return formatRowNumberCell(value); } },
                    { header: '차량번호', name: 'CAR_NO', width: 90, sortable: true },
                    { header: '제조사', name: 'CAR_MAKER', width: 100, sortable: true },
                    { header: '차종', name: 'CAR_NAME', width: 164, sortable: true },
                    { header: '모델명', name: 'CAR_MODEL', width: 260, sortable: true },
                    { header: '색상', name: 'CAR_COLOR', width: 80, sortable: true },
                    { header: '연식', name: 'CAR_OLD', width: 80, align: 'center', sortable: true },
                    { header: '배기량', name: 'CAR_CC', width: 80, align: 'right', sortable: true },
                    { header: '주행거리', name: 'CAR_DRIVEKM', width: 80, align: 'right', sortable: true },
                    { header: '주차장', name: 'CAR_PARK', width: 80, sortable: true },
                    { header: '차대번호', name: 'CAR_BODY_NO', width: 170, sortable: true },
                    { name: 'ROW_CHECKED', hidden: true },
                    { header: '입찰가격(만원)', name: 'BID_PRICE', width: 120, align: 'right', sortable: true, editor: 'text' },
                    // S : 공매 완료 시 추가. 퍼블본에서는 화면 확인용으로 노출
                    { header: '최고가(만원)', name: 'BID_MAX_PRICE', width: 120, align: 'right', sortable: true, formatter: function (value) { return formatPriceToManwon(value.value); } },
                    { header: '낙찰구분', name: 'CONTRACT_YN', width: 80, align: 'center', sortable: true, formatter: function (value) { return formatContractYn(value.value); } },
                    // E : 공매 완료 시 추가. 퍼블본에서는 화면 확인용으로 노출
                    // S : 관리자 계정에서만 노출. 퍼블본에서는 화면 확인용으로 노출
                    { header: '낙찰업체', name: 'BID_WINNER_MEM_ID', width: 201, sortable: true }
                    // E : 관리자 계정에서만 노출. 퍼블본에서는 화면 확인용으로 노출
                ],
                columnOptions: {
                    resizable: true
                }
            });
        }

        // 초기 진입 시 기본 화면을 세팅한다.
        function initializePage() {
            createGrid();
            setInitialGridState();
            syncFormFieldTitles();
        }

        // 화면 이벤트를 바인딩한다.
        function bindEvents() {
            // grid.on('click', function (ev) {
            //     if (ev.columnName !== 'ROW_NUM') {
            //         return;
            //     }

            //     toggleRowChecked(ev.rowKey);
            // });

            $('#searchBtn').on('click', function () {
                searchData();
            });

            $('.form-content .field-box input').on('input change', function () {
                syncFormFieldTitles();
            });

            $('.form-content .field-box select').on('change', function () {
                syncFormFieldTitles();
            });
        }

        $(function () {
            initializePage();
            bindEvents();
        });
    </script>
</body>
</html>
